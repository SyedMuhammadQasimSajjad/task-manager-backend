<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">


    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>SyncUp AI | Dashboard</title>
</head>
<body>
<div class="bg-blur-shapes">
    <div class="shape circle-1">
        <div class="shape circle-2"></div>
    </div>
    <div class="dashboard-container"></div>
</div>
<div class="app-container">

<!--    sidebar-->
    <aside class="sidebar">
        <div class="logo">
            <h2>SyncUp<span> AI Dashboard</span></h2>
        </div>
        <nav>
            <ul>

                <li class="filter-btn active" data-category="all"><i class="fa-solid fa-house"></i>All Task</li>
                <li class="filter-btn" data-category="high"><i class="fa-solid fa-star"></i>Important (High)</li>
                <li class="filter-btn" data-category="completed-list"><i class="fa-solid fa-check-double"></i>Completed</li>
            </ul>
        </nav>
    </aside>
<!--    main-task-->
    <header class="dashboard-header">
        <div class="welcome-text">
            <h1>Welcome Back, <span class="user-name">USER</span></h1>
            <p>You've got <p>
            Progress: <span id="completed-count">0</span> / <span id="total-count">0</span> tasks done

        </div>
        <div class="header-actions">
            <span id="current-date">May 12, 2026</span>
        </div>
    </header>
    <div class="progress-container">
        <div id="progress-fill"></div>
    </div>
    <main class="content">

        <div class="task-input-section">
            <input type="text" id="task-input" placeholder="Try Adding Finished University Assignment...">

            <button id="add-task-button">Add Task</button>
            <button id="ai-magic-button" title="AI Breakdown"><i class="fa-solid fa-wand-magic-sparkles"></i></button>

        </div>
        <div class="task-list" id="task-list">
<!--            sample tasks later JS-->
            <div class="task-card">
                <input type="checkbox" class="checkbox-input" id="checkbox-input">
                <span class="task-text">Welcome to SyncUp!Start by adding a task.</span>
                <i class="fa-solid fa-trash delete-icon"></i>
            </div>

        </div>
    </main>
</div>

<div id="priority-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Set Task Priority</h3>
            <p>Select the urgency level for your new task.</p>
        </div>
        <div class="priority-options">
            <button class="p-btn low" data-p="low">Low</button>
            <button class="p-btn medium" data-p="medium">Medium</button>
            <button class="p-btn high" data-p="high">High</button>
        </div>
        <button id="close-modal" class="close-btn">Cancel</button>
    </div>
</div>

<script src="index.js"></script>
</body>
</html>
